name: Update repo counts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/update-readme-counts.py'

jobs:
  update-counts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Count repos and update README
        env:
          GH_TOKEN: "${{ secrets.ORG_TOKEN }}"
        run: python3 scripts/update-readme-counts.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update repo counts" && git push)
