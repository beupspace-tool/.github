name: Update repo counts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-counts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Count and update README
        env:
          GH_TOKEN: ${{ secrets.ORG_TOKEN }}
        run: |
          python3 - << 'SCRIPT'
import subprocess, json

def count_topic(topic):
    r = subprocess.run(
        ['gh', 'repo', 'list', 'beupspace-tool', '--limit', '100', '--topic', topic, '--json', 'name'],
        capture_output=True, text=True
    )
    return len(json.loads(r.stdout))

p = count_topic('beup-product')
o = count_topic('beup-ops')
c = count_topic('client-work')
f = count_topic('fork-reference')

readme = (
    "# BEUP Space\n\n"
    f"[![BEUP Products](https://img.shields.io/badge/BEUP_Products-{p}_repos-4A90D9?style=for-the-badge)](https://github.com/search?q=org%3Abeupspace-tool+topic%3Abeup-product&type=repositories)\n"
    f"[![BEUP Ops](https://img.shields.io/badge/BEUP_Ops-{o}_repos-2ECC71?style=for-the-badge)](https://github.com/search?q=org%3Abeupspace-tool+topic%3Abeup-ops&type=repositories)\n"
    f"[![Client Work](https://img.shields.io/badge/Client_Work-{c}_repos-E67E22?style=for-the-badge)](https://github.com/search?q=org%3Abeupspace-tool+topic%3Aclient-work&type=repositories)\n"
    f"[![Fork Reference](https://img.shields.io/badge/Fork_Reference-{f}_repos-9B59B6?style=for-the-badge)](https://github.com/search?q=org%3Abeupspace-tool+topic%3Afork-reference&type=repositories)\n\n"
    "---\n\n"
    "| Category | Description |\n"
    "|---|---|\n"
    "| **BEUP Products** | Commercial tools & apps built for BEUP platform |\n"
    "| **BEUP Ops** | Internal workspace, Claude config, operational tooling |\n"
    "| **Client Work** | Consulting & client-specific projects |\n"
    "| **Fork Reference** | External repos forked for reference or customization |\n"
)

with open('profile/README.md', 'w') as fh:
    fh.write(readme)
print(f"Updated: product={p} ops={o} client={c} fork={f}")
SCRIPT

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update repo counts" && git push)
